<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>灵光收集箱 · v3</title>
    <style>
      :root {
        --bg: #0d1110;
        --app: #101513;
        --card: #171d1a;
        --card-soft: #131916;
        --ink: #edf7f2;
        --muted: #8fa099;
        --faint: #586862;
        --line: #26312c;
        --line-soft: #1d2622;
        --green: #56c997;
        --green-strong: #7be0b3;
        --green-soft: rgba(86,201,151,0.13);
        --amber: #dca247;
        --amber-soft: rgba(220,162,71,0.13);
        --red: #dc6b61;
        --red-soft: rgba(220,107,97,0.13);
        --purple: #a78bfa;
        --purple-soft: rgba(167,139,250,0.13);
        --radius: 14px;
        font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      }
      * { box-sizing:border-box; margin:0; padding:0; }
      body { min-height:100vh; display:flex; justify-content:center; background:#090d0b; color:var(--ink); }
      input,textarea,button { font:inherit; color:inherit; }
      button { border:0; background:none; cursor:pointer; }
      button:disabled { cursor:not-allowed; opacity:0.4; }
      textarea { resize:none; }
      .app { width:100%; max-width:480px; min-height:100vh; display:flex; flex-direction:column; background:var(--app); position:relative; }

      .tab-capture,.tab-task,.tab-idea { flex:1; display:none; flex-direction:column; padding-bottom:104px; }
      .tab-capture.active,.tab-task.active,.tab-idea.active { display:flex; }
      .tab-capture { height:100vh; overflow:hidden; padding:44px 24px 92px; }

      .date-hint { margin-bottom:32px; color:var(--green-strong); font-size:16px; font-weight:650; letter-spacing:0.3px; }
      .capture-input-box { flex:0 0 36vh; display:flex; flex-direction:column; min-height:220px; border:1px solid var(--line); border-radius:var(--radius); padding:18px 18px 0; background:var(--card); }
      .capture-input-box textarea { flex:1; min-height:140px; border:0; outline:none; background:transparent; color:var(--ink); font-size:18px; line-height:1.7; caret-color:var(--green); }
      .capture-input-box textarea::placeholder { color:var(--faint); }

      .capture-footer { display:flex; align-items:center; justify-content:flex-end; gap:10px; margin-top:16px; padding-top:16px; border-top:1px solid var(--line); }

      .type-toggle { display:flex; gap:4px; }
      .type-btn { padding:7px 16px; border-radius:999px; font-size:13px; font-weight:620; border:1px solid var(--line); color:var(--muted); background:transparent; transition:all 0.12s; }
      .type-btn.active-task { border-color:var(--green); background:var(--green-soft); color:var(--green-strong); }
      .type-btn.active-idea { border-color:var(--purple); background:var(--purple-soft); color:var(--purple); }

      .save-btn { min-width:80px; border-radius:999px; background:var(--green); color:#07100c; padding:12px 24px; font-size:15px; font-weight:760; }
      .save-btn:disabled { background:#213029; color:#6f837a; opacity:1; }

      .home-active { min-height:0; display:flex; flex:1; flex-direction:column; padding-top:18px; }
      .home-active-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
      .home-active-header h2 { font-size:16px; line-height:1.2; font-weight:760; }
      .home-active-header button { color:var(--green-strong); font-size:13px; font-weight:650; }
      .home-active-list { display:grid; gap:8px; overflow:hidden; }
      .home-task { display:flex; align-items:flex-start; gap:10px; border:1px solid var(--line); border-radius:var(--radius); background:var(--card); padding:11px 12px; box-shadow:0 12px 30px rgba(0,0,0,0.16); }
      .home-task.active .status-btn { border-color:var(--amber); background:var(--amber-soft); }
      .home-task.active .status-btn::before { width:8px; height:8px; border-radius:999px; background:var(--amber); content:""; }
      .home-task-body { flex:1; min-width:0; }
      .home-task-title { overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; font-size:14px; line-height:1.45; font-weight:620; color:var(--ink); }
      .home-task-meta { margin-top:5px; color:var(--faint); font-size:12px; }
      .home-task-actions { display:flex; gap:12px; margin-top:8px; }
      .home-task-actions button { color:var(--green-strong); font-size:13px; font-weight:650; }
      .home-task-actions button.secondary { color:var(--muted); }
      .home-more { color:var(--muted); font-size:12px; line-height:1.45; }

      .tab-task,.tab-idea { padding:28px 18px 110px; overflow-y:auto; }
      .list-header { display:grid; gap:10px; margin-bottom:18px; }
      .search-box { width:100%; border:1px solid var(--line); border-radius:999px; background:var(--card); color:var(--ink); outline:none; padding:11px 15px; font-size:15px; }
      .search-box::placeholder { color:var(--faint); }
      .search-box:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(86,201,151,0.1); }
      .filter-group { display:flex; gap:7px; overflow-x:auto; padding-bottom:2px; }
      .filter-btn { flex:0 0 auto; border:1px solid var(--line); border-radius:999px; background:var(--card); color:var(--muted); padding:7px 13px; font-size:13px; font-weight:620; }
      .filter-btn.active { border-color:var(--green); background:var(--green-soft); color:var(--green-strong); }

      .day-group { margin-bottom:22px; }
      .day-label { margin-bottom:10px; padding-left:2px; color:var(--muted); font-size:14px; font-weight:680; }

      .month-group { margin-bottom:24px; }
      .month-header {
        display:flex; align-items:center; justify-content:space-between;
        margin-bottom:12px; padding:10px 12px; border-radius:var(--radius);
        border:1px solid var(--line); background:var(--card-soft);
        cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
        transition:background 0.15s;
      }
      .month-header:hover { background:var(--card); }
      .month-header:active { background:var(--line-soft); }
      .month-header-left { display:flex; align-items:center; gap:10px; }
      .month-title { color:var(--ink); font-size:15px; font-weight:700; }
      .month-count { color:var(--faint); font-size:12px; font-weight:500; }
      .month-status-dots { display:flex; gap:5px; align-items:center; }
      .month-status-dot { width:6px; height:6px; border-radius:999px; }
      .month-status-dot.open { background:var(--faint); }
      .month-status-dot.active { background:var(--amber); }
      .month-status-dot.completed { background:var(--green); }
      .month-status-dot.abandoned { background:var(--red); }
      .month-chevron {
        width:18px; height:18px; color:var(--faint); flex-shrink:0;
        transition:transform 0.2s ease; display:flex; align-items:center; justify-content:center;
      }
      .month-chevron svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
      .month-group.collapsed .month-chevron { transform:rotate(-90deg); }
      .month-body { overflow:hidden; transition:max-height 0.3s ease, opacity 0.2s ease; }
      .month-group.collapsed .month-body { max-height:0!important; opacity:0; }
      .month-group:not(.collapsed) .month-body { opacity:1; }

      .record-card { display:flex; gap:12px; align-items:flex-start; margin-bottom:8px; border:1px solid var(--line); border-radius:var(--radius); background:var(--card); padding:15px 14px 13px; }
      .record-card.completed { opacity:0.72; }
      .record-card.completed .record-text { text-decoration:line-through; }
      .record-card.abandoned { opacity:0.64; }

      .status-btn { width:23px; height:23px; flex:0 0 23px; display:grid; place-items:center; margin-top:2px; border:2px solid var(--faint); border-radius:999px; color:transparent; }
      .record-card.active .status-btn { border-color:var(--amber); background:var(--amber-soft); }
      .record-card.active .status-btn::before { width:8px; height:8px; border-radius:999px; background:var(--amber); content:""; }
      .record-card.completed .status-btn { border-color:var(--green); background:var(--green); color:#07100c; }
      .record-card.abandoned .status-btn { border-color:var(--red); background:var(--red-soft); }
      .record-card.abandoned .status-btn::before { width:9px; height:2px; border-radius:999px; background:var(--red); content:""; }
      .status-btn svg { display:none; width:13px; height:13px; fill:none; stroke:currentColor; stroke-linecap:round; stroke-linejoin:round; stroke-width:2.5; }
      .record-card.completed .status-btn svg { display:block; }

      .record-body { flex:1; min-width:0; }
      .record-text { margin-bottom:7px; overflow-wrap:anywhere; font-size:15px; line-height:1.5; color:var(--ink); }
      .record-meta { color:var(--faint); font-size:12px; line-height:1.45; }
      .record-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:9px; }
      .record-actions button { color:var(--green-strong); font-size:13px; font-weight:650; }
      .record-actions button.secondary { color:var(--muted); }
      .record-actions button.danger { color:var(--red); }

      .record-delete { width:28px; height:28px; flex:0 0 28px; display:grid; place-items:center; margin-top:-2px; border-radius:999px; color:var(--faint); }
      .record-delete:hover { background:var(--red-soft); color:var(--red); }
      .record-delete svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-linecap:round; stroke-linejoin:round; stroke-width:1.8; }

      .empty-state { padding:62px 20px; color:var(--faint); font-size:14px; line-height:1.6; text-align:center; }

      /* 灵感卡片 */
      .idea-card { display:flex; gap:12px; align-items:flex-start; margin-bottom:8px; border:1px solid var(--line); border-radius:var(--radius); background:var(--card); padding:15px 14px 13px; }
      .idea-archive-btn { width:23px; height:23px; flex:0 0 23px; display:grid; place-items:center; margin-top:2px; border:2px solid var(--faint); border-radius:999px; color:transparent; cursor:pointer; background:transparent; transition:all 0.15s; }
      .idea-card.archived .idea-archive-btn { border-color:var(--purple); background:var(--purple); }
      .idea-card.archived .idea-archive-btn svg { display:block; width:13px; height:13px; fill:none; stroke:#fff; stroke-linecap:round; stroke-linejoin:round; stroke-width:2.5; }
      .idea-card.archived .idea-archive-btn::before { content:none; }
      .idea-card.archived { opacity:0.72; }
      .idea-card.archived .idea-text { text-decoration:line-through; color:var(--muted); }
      .idea-body { flex:1; min-width:0; }
      .idea-text { margin-bottom:7px; overflow-wrap:anywhere; font-size:15px; line-height:1.5; color:var(--ink); }
      .idea-meta { color:var(--faint); font-size:12px; line-height:1.45; }
      .idea-delete { width:28px; height:28px; flex:0 0 28px; display:grid; place-items:center; margin-top:-2px; border-radius:999px; color:var(--faint); cursor:pointer; }
      .idea-delete:hover { background:var(--red-soft); color:var(--red); }
      .idea-delete svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-linecap:round; stroke-linejoin:round; stroke-width:1.8; }

      .bottom-nav { position:fixed; right:0; bottom:0; left:0; display:flex; width:100%; max-width:480px; margin:0 auto; border-top:1px solid var(--line); background:rgba(13,17,15,0.9); backdrop-filter:blur(16px); z-index:5; }
      .bottom-nav button { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 12px; color:var(--faint); font-size:11px; font-weight:680; }
      .bottom-nav button.active { color:var(--green); }
      .bottom-nav button[data-tab="idea"].active { color:var(--purple); }
      .bottom-nav svg { width:22px; height:22px; fill:none; stroke:currentColor; stroke-linecap:round; stroke-linejoin:round; stroke-width:1.8; }

      .toast { position:fixed; bottom:84px; left:50%; z-index:10; transform:translateX(-50%); border-radius:999px; background:#dff8ec; color:#07100c; padding:10px 22px; opacity:0; pointer-events:none; white-space:nowrap; font-size:13px; font-weight:560; transition:opacity 0.2s ease; }
      .toast.show { opacity:1; }

      @media (max-width:520px) { .tab-capture { padding:30px 18px 88px; } .tab-task,.tab-idea { padding:18px 16px 100px; } .capture-area textarea { min-height:110px; font-size:16px; } }
      @media (prefers-reduced-motion:reduce) { *,*::before,*::after { transition:none!important; } }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="tab-capture active" id="captureTab">
        <div class="date-hint" id="dateHint"></div>
        <div class="capture-input-box">
          <textarea id="captureInput" placeholder="写下刚想到的东西…" maxlength="500"></textarea>
          <div class="capture-footer">
            <div class="type-toggle">
              <button class="type-btn active-task" id="typeTaskBtn" type="button">任务</button>
              <button class="type-btn" id="typeIdeaBtn" type="button">灵感</button>
            </div>
            <button class="save-btn" id="saveBtn" type="button" disabled>保存</button>
          </div>
        </div>
        <section class="home-active" aria-labelledby="homeActiveTitle">
          <div class="home-active-header">
            <h2 id="homeActiveTitle">进行中</h2>
            <button type="button" id="viewAllActiveBtn">查看更多</button>
          </div>
          <div class="home-active-list" id="homeActiveList"></div>
        </section>
      </section>

      <section class="tab-task" id="taskTab">
        <header class="list-header">
          <input class="search-box" id="taskSearch" type="search" placeholder="搜索任务..." autocomplete="off" />
          <div class="filter-group">
            <button class="filter-btn active" type="button" data-filter="all">全部</button>
            <button class="filter-btn" type="button" data-filter="open">未处理</button>
            <button class="filter-btn" type="button" data-filter="active">进行中</button>
            <button class="filter-btn" type="button" data-filter="completed">已完成</button>
            <button class="filter-btn" type="button" data-filter="abandoned">已放弃</button>
          </div>
        </header>
        <div id="taskList"></div>
      </section>

      <section class="tab-idea" id="ideaTab">
        <header class="list-header">
          <input class="search-box" id="ideaSearch" type="search" placeholder="搜索灵感..." autocomplete="off" />
          <div class="filter-group">
            <button class="filter-btn active" type="button" data-idea-filter="all">全部</button>
            <button class="filter-btn" type="button" data-idea-filter="unprocessed">未处理</button>
            <button class="filter-btn" type="button" data-idea-filter="archived">已整理</button>
          </div>
        </header>
        <div id="ideaList"></div>
      </section>

      <nav class="bottom-nav">
        <button class="active" type="button" data-tab="capture">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          <span>记</span>
        </button>
        <button type="button" data-tab="task">
          <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
          <span>任务</span>
        </button>
        <button type="button" data-tab="idea">
          <svg viewBox="0 0 24 24"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6 12a6 6 0 0112 0c0 2-.8 3.5-2 4.5V18a1 1 0 01-1 1H9a1 1 0 01-1-1v-1.5C6.8 15.5 6 14 6 12z"/></svg>
          <span>灵感</span>
        </button>
      </nav>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script>
      const STORAGE_KEY = "spark-inbox-v3";

      function daysAgo(n, h, m) {
        const d = new Date();
        d.setDate(d.getDate() - n);
        d.setHours(h != null ? h : 10 + Math.floor(Math.random() * 8), m != null ? m : Math.floor(Math.random() * 60), 0, 0);
        return d.getTime();
      }

      const seedRecords = [
        { id:id(), content:"智能小车：先想清楚循迹和避障第一版怎么取舍", type:"task", status:"active", createdAt:daysAgo(0,10), startedAt:daysAgo(0,10), completedAt:null, abandonedAt:null },
        { id:id(), content:"HTML视频标签要查 controls、poster、source 三个点", type:"task", status:"open", createdAt:daysAgo(0,14), startedAt:null, completedAt:null, abandonedAt:null },
        { id:id(), content:"基因的自私性——这个角度可以联系到人类社会合作行为", type:"idea", status:"unprocessed", createdAt:daysAgo(0,16) },
        { id:id(), content:"酒馆学习可能需要先整理一个最小可开始清单", type:"task", status:"open", createdAt:daysAgo(1,9), startedAt:null, completedAt:null, abandonedAt:null },
        { id:id(), content:"整理一下本周的待办事项", type:"task", status:"completed", createdAt:daysAgo(1,11), startedAt:daysAgo(1,11), completedAt:daysAgo(0,10), abandonedAt:null },
        { id:id(), content:"Obsidian 里整理笔记时发现知识网络的连接比内容本身更重要", type:"idea", status:"archived", createdAt:daysAgo(1,15), archivedAt:daysAgo(0,12) },
        { id:id(), content:"app 不应该只是记录，更应该是想法的暂存入口", type:"idea", status:"archived", createdAt:daysAgo(2,10), archivedAt:daysAgo(1,14) },
        { id:id(), content:"研究一下 Capacitor 打包 Android 的流程", type:"task", status:"active", createdAt:daysAgo(2,14), startedAt:daysAgo(2,14), completedAt:null, abandonedAt:null },
        { id:id(), content:"先不做复杂优先级矩阵，第一版会太重", type:"task", status:"abandoned", createdAt:daysAgo(3,9), startedAt:null, completedAt:null, abandonedAt:daysAgo(2,16) },
        { id:id(), content:"SharedPreferences 存储方案确认", type:"task", status:"completed", createdAt:daysAgo(3,13), startedAt:daysAgo(3,13), completedAt:daysAgo(3,17), abandonedAt:null },
        { id:id(), content:"人脑的工作记忆只能同时处理 4 个项目，这个限制影响了所有 UI 设计", type:"idea", status:"unprocessed", createdAt:daysAgo(3,16) },
        { id:id(), content:"底部导航从两 tab 改成三 tab 的方案", type:"task", status:"completed", createdAt:daysAgo(4,10), startedAt:daysAgo(4,10), completedAt:daysAgo(3,15), abandonedAt:null },
        { id:id(), content:"灵感分类功能：task 和 idea 两种类型", type:"task", status:"completed", createdAt:daysAgo(5,11), startedAt:daysAgo(5,11), completedAt:daysAgo(4,14), abandonedAt:null },
        { id:id(), content:"看下 Jetpack Compose 的基础组件", type:"task", status:"open", createdAt:daysAgo(5,15), startedAt:null, completedAt:null, abandonedAt:null },
        { id:id(), content:"「反脆弱」的核心观点：从波动中获益的系统设计思路", type:"idea", status:"unprocessed", createdAt:daysAgo(5,18) },
        { id:id(), content:"图标设计稿提取脚本优化", type:"task", status:"completed", createdAt:daysAgo(6,10), startedAt:daysAgo(6,10), completedAt:daysAgo(5,16), abandonedAt:null },
        { id:id(), content:"Android 手动编译打包流程梳理", type:"task", status:"completed", createdAt:daysAgo(7,9), startedAt:daysAgo(7,9), completedAt:daysAgo(6,12), abandonedAt:null },
        { id:id(), content:"确认 minSdk 和 targetSdk 版本", type:"task", status:"completed", createdAt:daysAgo(7,14), startedAt:daysAgo(7,14), completedAt:daysAgo(7,17), abandonedAt:null },
        { id:id(), content:"研究 aapt2 和 d8 的命令行用法", type:"task", status:"completed", createdAt:daysAgo(8,11), startedAt:daysAgo(8,11), completedAt:daysAgo(7,13), abandonedAt:null },
        { id:id(), content:"深色主题配色方案确定", type:"task", status:"completed", createdAt:daysAgo(9,10), startedAt:daysAgo(9,10), completedAt:daysAgo(8,15), abandonedAt:null },
        { id:id(), content:"移动端适配 max-width 480px 方案", type:"task", status:"completed", createdAt:daysAgo(9,16), startedAt:daysAgo(9,16), completedAt:daysAgo(9,18), abandonedAt:null },
        { id:id(), content:"状态流转机制设计：open → active → completed", type:"task", status:"completed", createdAt:daysAgo(10,9), startedAt:daysAgo(10,9), completedAt:daysAgo(9,14), abandonedAt:null },
        { id:id(), content:"localStorage 数据结构定义", type:"task", status:"completed", createdAt:daysAgo(11,11), startedAt:daysAgo(11,11), completedAt:daysAgo(10,13), abandonedAt:null },
        { id:id(), content:"看看有没有现成的轻量级状态管理方案", type:"task", status:"abandoned", createdAt:daysAgo(11,15), startedAt:null, completedAt:null, abandonedAt:daysAgo(10,10) },
        { id:id(), content:"首页设计：只保留日期和输入区", type:"task", status:"completed", createdAt:daysAgo(12,10), startedAt:daysAgo(12,10), completedAt:daysAgo(11,16), abandonedAt:null },
        { id:id(), content:"项目初始化，确定技术栈", type:"task", status:"completed", createdAt:daysAgo(13,9), startedAt:daysAgo(13,9), completedAt:daysAgo(12,12), abandonedAt:null },
        { id:id(), content:"调研几个备忘录 app 的交互设计", type:"task", status:"completed", createdAt:daysAgo(13,14), startedAt:daysAgo(13,14), completedAt:daysAgo(13,18), abandonedAt:null },
        { id:id(), content:"确定 app 名称和定位", type:"task", status:"completed", createdAt:daysAgo(14,10), startedAt:daysAgo(14,10), completedAt:daysAgo(13,12), abandonedAt:null },
        { id:id(), content:"记录删除的二次确认机制", type:"task", status:"completed", createdAt:daysAgo(16,11), startedAt:daysAgo(16,11), completedAt:daysAgo(15,15), abandonedAt:null },
        { id:id(), content:"Toast 提示组件实现", type:"task", status:"completed", createdAt:daysAgo(18,9), startedAt:daysAgo(18,9), completedAt:daysAgo(17,14), abandonedAt:null },
        { id:id(), content:"搜索功能的实时过滤逻辑", type:"task", status:"completed", createdAt:daysAgo(18,16), startedAt:daysAgo(18,16), completedAt:daysAgo(18,18), abandonedAt:null },
        { id:id(), content:"记录卡片的状态圆圈设计", type:"task", status:"completed", createdAt:daysAgo(20,10), startedAt:daysAgo(20,10), completedAt:daysAgo(19,13), abandonedAt:null },
        { id:id(), content:"日期分组显示逻辑", type:"task", status:"completed", createdAt:daysAgo(22,14), startedAt:daysAgo(22,14), completedAt:daysAgo(21,16), abandonedAt:null },
        { id:id(), content:"初始原型搭建", type:"task", status:"completed", createdAt:daysAgo(25,9), startedAt:daysAgo(25,9), completedAt:daysAgo(23,18), abandonedAt:null },
        { id:id(), content:"Cursor 编辑器试用体验不错，AI 补全很准", type:"idea", status:"archived", createdAt:daysAgo(30,14), archivedAt:daysAgo(28,10) },
        { id:id(), content:"了解一下 RAG 的基本原理", type:"idea", status:"unprocessed", createdAt:daysAgo(35,11) },
        { id:id(), content:"Flutter 跨平台方案调研", type:"task", status:"completed", createdAt:daysAgo(40,9), startedAt:daysAgo(40,9), completedAt:daysAgo(38,16), abandonedAt:null },
        { id:id(), content:"阅读《原子习惯》前两章", type:"task", status:"abandoned", createdAt:daysAgo(45,15), startedAt:null, completedAt:null, abandonedAt:daysAgo(42,10) },
        { id:id(), content:"Markdown 渲染引擎选型", type:"task", status:"completed", createdAt:daysAgo(50,10), startedAt:daysAgo(50,10), completedAt:daysAgo(48,14), abandonedAt:null },
        { id:id(), content:"低代码平台的局限性分析", type:"idea", status:"archived", createdAt:daysAgo(55,16), archivedAt:daysAgo(52,11) },
      ];

      let state = loadState();
      let activeTab = "capture";
      let captureType = "task";
      let taskFilter = "all";
      let ideaFilter = "all";
      let toastTimer;

      const input = document.querySelector("#captureInput");
      const saveBtn = document.querySelector("#saveBtn");
      const homeActiveList = document.querySelector("#homeActiveList");
      const viewAllActiveBtn = document.querySelector("#viewAllActiveBtn");
      const typeTaskBtn = document.querySelector("#typeTaskBtn");
      const typeIdeaBtn = document.querySelector("#typeIdeaBtn");
      const taskSearch = document.querySelector("#taskSearch");
      const ideaSearch = document.querySelector("#ideaSearch");
      const taskList = document.querySelector("#taskList");
      const ideaList = document.querySelector("#ideaList");

      function id() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+"-"+Math.random().toString(36).slice(2); }

      function loadState() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return { records: seedRecords };
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed.records)) return { records: parsed.records };
        } catch {}
        return { records: seedRecords };
      }

      function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      function persistAndRender() { saveState(); render(); }

      function formatDateTime(ts) {
        return new Intl.DateTimeFormat("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}).format(new Date(ts));
      }

      function dateKey(ts) { const d=new Date(ts); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
      function todayKey() { return dateKey(Date.now()); }
      function yesterdayKey() { const d=new Date(); d.setDate(d.getDate()-1); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
      function dayLabel(k) { if(k===todayKey()) return "今天"; if(k===yesterdayKey()) return "昨天"; const d=new Date(k); return (d.getMonth()+1)+"月"+d.getDate()+"日"; }

      function statusLabel(s) { return { open:"未处理", active:"进行中", completed:"已完成", abandoned:"已放弃" }[s]; }

      function addRecord() {
        const content = input.value.trim();
        if (!content) return;
        const base = { id:id(), content, createdAt:Date.now() };
        if (captureType === "task") {
          state.records.unshift({ ...base, type:"task", status:"open", startedAt:null, completedAt:null, abandonedAt:null });
        } else {
          state.records.unshift({ ...base, type:"idea", status:"unprocessed", archivedAt:null });
        }
        input.value = "";
        updateInputState();
        persistAndRender();
        showToast("已保存");
      }

      function cycleTask(rec) {
        if (rec.status === "open") { startTask(rec.id); return; }
        if (rec.status === "active") { completeTask(rec.id); return; }
        reopenTask(rec.id);
      }

      function startTask(id) { const n=Date.now(); state.records=state.records.map(r=>r.id===id?{...r,status:"active",startedAt:r.startedAt||n}:r); persistAndRender(); showToast("已开始"); }
      function completeTask(id) { const n=Date.now(); state.records=state.records.map(r=>r.id===id?{...r,status:"completed",completedAt:n,abandonedAt:null}:r); persistAndRender(); showToast("已完成"); }
      function pauseTask(id) { state.records=state.records.map(r=>r.id===id?{...r,status:"open",updatedAt:Date.now()}:r); persistAndRender(); showToast("已放回未处理"); }
      function abandonTask(id) { const n=Date.now(); state.records=state.records.map(r=>r.id===id?{...r,status:"abandoned",completedAt:null,abandonedAt:n}:r); persistAndRender(); showToast("已放弃"); }
      function reopenTask(id) { state.records=state.records.map(r=>r.id===id?{...r,status:"open",startedAt:null,completedAt:null,abandonedAt:null,updatedAt:Date.now()}:r); persistAndRender(); showToast("已恢复"); }
      function deleteRecord(id) { state.records=state.records.filter(r=>r.id!==id); persistAndRender(); showToast("已删除"); }

      function editRecord(id) {
        const rec = state.records.find(r=>r.id===id);
        if (!rec) return;
        const next = window.prompt("编辑记录", rec.content);
        if (next===null) return;
        const content = next.trim();
        if (!content) { showToast("内容不能为空"); return; }
        state.records=state.records.map(r=>r.id===id?{...r,content}:r);
        persistAndRender(); showToast("已更新");
      }

      function toggleIdea(id) {
        state.records = state.records.map(r => {
          if (r.id !== id || r.type !== "idea") return r;
          if (r.status === "archived") return { ...r, status:"unprocessed", archivedAt:null };
          return { ...r, status:"archived", archivedAt:Date.now() };
        });
        persistAndRender();
        const r = state.records.find(x=>x.id===id);
        showToast(r.status==="archived" ? "已标记为已整理" : "已标记为未处理");
      }

      function filteredTasks() {
        const q = taskSearch.value.trim().toLowerCase();
        let rs = state.records.filter(r => r.type === "task");
        if (taskFilter === "all") rs = rs.filter(r => r.status !== "abandoned");
        else rs = rs.filter(r => r.status === taskFilter);
        if (q) rs = rs.filter(r => r.content.toLowerCase().includes(q));
        return rs.sort((a,b)=>b.createdAt-a.createdAt);
      }

      function filteredIdeas() {
        const q = ideaSearch.value.trim().toLowerCase();
        let rs = state.records.filter(r => r.type === "idea");
        if (ideaFilter !== "all") rs = rs.filter(r => r.status === ideaFilter);
        if (q) rs = rs.filter(r => r.content.toLowerCase().includes(q));
        return rs.sort((a,b)=>b.createdAt-a.createdAt);
      }

      function groupByDay(records) {
        const m = new Map();
        records.forEach(r=>{ const k=dateKey(r.createdAt); if(!m.has(k)) m.set(k,[]); m.get(k).push(r); });
        return [...m.entries()].sort(([a],[b])=>a>b?-1:1).map(([k,rs])=>({key:k,records:rs}));
      }

      const RECENT_DAYS = 7;
      const monthCollapsed = new Set();
      function monthKey(ts) { const d=new Date(ts); return d.getFullYear()+"-"+(d.getMonth()+1); }
      function isRecent(dk) { const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),d=new Date(dk); return Math.floor((today-d)/(1000*60*60*24))<RECENT_DAYS; }
      function monthLabel(mk) { const [y,m]=mk.split("-"); return y+"年"+parseInt(m)+"月"; }
      function groupByMonth(records) {
        const m = new Map();
        records.forEach(r=>{ const k=monthKey(r.createdAt); if(!m.has(k)) m.set(k,[]); m.get(k).push(r); });
        return [...m.entries()].sort(([a],[b])=>a>b?-1:1).map(([k,rs])=>({key:k,records:rs}));
      }
      function getStatusSummary(records) {
        const c={open:0,active:0,completed:0,abandoned:0}; records.forEach(r=>c[r.status]++); return c;
      }

      function renderCapture() {
        const n=new Date(); const w=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"][n.getDay()];
        document.querySelector("#dateHint").textContent = (n.getMonth()+1)+"月"+n.getDate()+"日 · "+w;

        const active = state.records.filter(r=>r.type==="task"&&r.status==="active").sort((a,b)=>(b.startedAt||b.createdAt)-(a.startedAt||a.createdAt));
        const show = active.slice(0,3);
        homeActiveList.replaceChildren();
        if (show.length===0) {
          const e=document.createElement("div"); e.className="home-more"; e.textContent="还没有进行中的任务。"; homeActiveList.append(e);
        } else {
          show.forEach(r=>homeActiveList.append(createHomeTask(r)));
          if (active.length>show.length) {
            const m=document.createElement("div"); m.className="home-more"; m.textContent="还有 "+(active.length-show.length)+" 条，去「任务」页面处理。"; homeActiveList.append(m);
          }
        }
      }

      function createHomeTask(rec) {
        const item=document.createElement("article"); item.className="home-task "+rec.status;
        const sb=document.createElement("button"); sb.className="status-btn"; sb.type="button"; sb.setAttribute("aria-label",statusLabel(rec.status));
        sb.innerHTML='<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>';
        sb.addEventListener("click",()=>cycleTask(rec));
        const body=document.createElement("div"); body.className="home-task-body";
        const t=document.createElement("div"); t.className="home-task-title"; t.textContent=rec.content;
        const m=document.createElement("div"); m.className="home-task-meta"; m.textContent="开始 "+formatDateTime(rec.startedAt||rec.createdAt);
        const a=document.createElement("div"); a.className="home-task-actions";
        a.appendChild(actBtn("编辑",()=>editRecord(rec.id),"secondary"));
        body.append(t,m,a); item.append(sb,body); return item;
      }

      function actBtn(label,onClick,cls) {
        const b=document.createElement("button"); b.type="button"; b.textContent=label; if(cls) b.className=cls; b.addEventListener("click",onClick); return b;
      }

      function renderTasks() {
        const allFiltered = filteredTasks();
        taskList.replaceChildren();
        if (allFiltered.length===0) {
          const e=document.createElement("div"); e.className="empty-state";
          e.innerHTML = taskSearch.value.trim() ? "没有找到相关任务" : "还没有任务<br />去「记」页面写下第一条";
          taskList.append(e); return;
        }

        const recent=[], old=[];
        allFiltered.forEach(r => { if(isRecent(dateKey(r.createdAt))) recent.push(r); else old.push(r); });

        if (recent.length>0) {
          groupByDay(recent).forEach(g=>{
            const sec=document.createElement("section"); sec.className="day-group";
            const l=document.createElement("div"); l.className="day-label"; l.textContent=dayLabel(g.key);
            sec.append(l); g.records.forEach(r=>sec.append(createTaskCard(r))); taskList.append(sec);
          });
        }

        if (old.length>0) {
          groupByMonth(old).forEach(mg=>{
            const collapsed=monthCollapsed.has(mg.key);
            const summary=getStatusSummary(mg.records);
            const sec=document.createElement("section"); sec.className="month-group"+(collapsed?" collapsed":"");
            const header=document.createElement("div"); header.className="month-header";
            header.addEventListener("click",()=>{ if(monthCollapsed.has(mg.key)) monthCollapsed.delete(mg.key); else monthCollapsed.add(mg.key); renderTasks(); });
            const hl=document.createElement("div"); hl.className="month-header-left";
            const t=document.createElement("span"); t.className="month-title"; t.textContent=monthLabel(mg.key);
            const c=document.createElement("span"); c.className="month-count"; c.textContent=mg.records.length+"条";
            hl.append(t,c);
            const dots=document.createElement("div"); dots.className="month-status-dots";
            if(summary.open>0){const d=document.createElement("div");d.className="month-status-dot open";d.title=summary.open+"条未处理";dots.append(d);}
            if(summary.active>0){const d=document.createElement("div");d.className="month-status-dot active";d.title=summary.active+"条进行中";dots.append(d);}
            if(summary.completed>0){const d=document.createElement("div");d.className="month-status-dot completed";d.title=summary.completed+"条已完成";dots.append(d);}
            const chev=document.createElement("div"); chev.className="month-chevron"; chev.innerHTML='<svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>';
            header.append(hl,dots,chev);
            const body=document.createElement("div"); body.className="month-body";
            groupByDay(mg.records).forEach(dg=>{
              const ds=document.createElement("section"); ds.className="day-group";
              const l=document.createElement("div"); l.className="day-label"; l.textContent=dayLabel(dg.key);
              ds.append(l); dg.records.forEach(r=>ds.append(createTaskCard(r))); body.append(ds);
            });
            sec.append(header,body); taskList.append(sec);
            if(!collapsed) requestAnimationFrame(()=>{body.style.maxHeight=body.scrollHeight+"px";});
          });
        }
      }

      function taskMeta(rec) {
        const p=[statusLabel(rec.status)+" · 记录 "+formatDateTime(rec.createdAt)];
        if(rec.startedAt) p.push("开始 "+formatDateTime(rec.startedAt));
        if(rec.completedAt) p.push("完成 "+formatDateTime(rec.completedAt));
        if(rec.abandonedAt) p.push("放弃 "+formatDateTime(rec.abandonedAt));
        return p.join(" · ");
      }

      function createTaskCard(rec) {
        const card=document.createElement("article"); card.className="record-card "+rec.status;
        const sb=document.createElement("button"); sb.className="status-btn"; sb.type="button"; sb.setAttribute("aria-label",statusLabel(rec.status));
        sb.innerHTML='<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>';
        sb.addEventListener("click",()=>cycleTask(rec));
        const body=document.createElement("div"); body.className="record-body";
        const t=document.createElement("div"); t.className="record-text"; t.textContent=rec.content;
        const meta=document.createElement("div"); meta.className="record-meta"; meta.textContent=taskMeta(rec);
        const aa=document.createElement("div"); aa.className="record-actions";
        if (rec.status==="open") { aa.append(actBtn("编辑",()=>editRecord(rec.id),"secondary"),actBtn("完成",()=>completeTask(rec.id)),actBtn("放弃",()=>abandonTask(rec.id),"danger")); }
        else if (rec.status==="active") { aa.append(actBtn("编辑",()=>editRecord(rec.id),"secondary"),actBtn("放回未处理",()=>pauseTask(rec.id),"secondary"),actBtn("放弃",()=>abandonTask(rec.id),"danger")); }
        else if (rec.status==="completed") { aa.append(actBtn("编辑",()=>editRecord(rec.id),"secondary"),actBtn("放弃",()=>abandonTask(rec.id),"danger")); }
        else { aa.append(actBtn("编辑",()=>editRecord(rec.id),"secondary")); }
        body.append(t,meta,aa);
        const del=document.createElement("button"); del.className="record-delete"; del.setAttribute("aria-label","删除");
        del.innerHTML='<svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>';
        del.addEventListener("click",()=>deleteRecord(rec.id));
        card.append(sb,body,del); return card;
      }

      function renderIdeas() {
        const allFiltered = filteredIdeas();
        ideaList.replaceChildren();
        if (allFiltered.length===0) {
          const e=document.createElement("div"); e.className="empty-state";
          e.innerHTML = ideaSearch.value.trim() ? "没有找到相关灵感" : "还没有灵感<br />去「记」页面写下第一条";
          ideaList.append(e); return;
        }

        const recent=[], old=[];
        allFiltered.forEach(r => { if(isRecent(dateKey(r.createdAt))) recent.push(r); else old.push(r); });

        if (recent.length>0) {
          groupByDay(recent).forEach(g=>{
            const sec=document.createElement("section"); sec.className="day-group";
            const l=document.createElement("div"); l.className="day-label"; l.textContent=dayLabel(g.key);
            sec.append(l); g.records.forEach(r=>sec.append(createIdeaCard(r))); ideaList.append(sec);
          });
        }

        if (old.length>0) {
          groupByMonth(old).forEach(mg=>{
            const collapsed=monthCollapsed.has(mg.key);
            const unprocCount=mg.records.filter(r=>r.status==="unprocessed").length;
            const archCount=mg.records.filter(r=>r.status==="archived").length;
            const sec=document.createElement("section"); sec.className="month-group"+(collapsed?" collapsed":"");
            const header=document.createElement("div"); header.className="month-header";
            header.addEventListener("click",()=>{ if(monthCollapsed.has(mg.key)) monthCollapsed.delete(mg.key); else monthCollapsed.add(mg.key); renderIdeas(); });
            const hl=document.createElement("div"); hl.className="month-header-left";
            const t=document.createElement("span"); t.className="month-title"; t.textContent=monthLabel(mg.key);
            const c=document.createElement("span"); c.className="month-count"; c.textContent=mg.records.length+"条";
            hl.append(t,c);
            const dots=document.createElement("div"); dots.className="month-status-dots";
            if(unprocCount>0){const d=document.createElement("div");d.className="month-status-dot open";d.title=unprocCount+"条未处理";dots.append(d);}
            if(archCount>0){const d=document.createElement("div");d.className="month-status-dot completed";d.title=archCount+"条已整理";dots.append(d);}
            const chev=document.createElement("div"); chev.className="month-chevron"; chev.innerHTML='<svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>';
            header.append(hl,dots,chev);
            const body=document.createElement("div"); body.className="month-body";
            groupByDay(mg.records).forEach(dg=>{
              const ds=document.createElement("section"); ds.className="day-group";
              const l=document.createElement("div"); l.className="day-label"; l.textContent=dayLabel(dg.key);
              ds.append(l); dg.records.forEach(r=>ds.append(createIdeaCard(r))); body.append(ds);
            });
            sec.append(header,body); ideaList.append(sec);
            if(!collapsed) requestAnimationFrame(()=>{body.style.maxHeight=body.scrollHeight+"px";});
          });
        }
      }

      function createIdeaCard(rec) {
        const card=document.createElement("article"); card.className="idea-card"+(rec.status==="archived"?" archived":"");
        const ab=document.createElement("button"); ab.className="idea-archive-btn"; ab.type="button";
        ab.setAttribute("aria-label",rec.status==="archived"?"标记为未处理":"标记为已整理");
        ab.innerHTML='<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>';
        ab.addEventListener("click",()=>toggleIdea(rec.id));
        const body=document.createElement("div"); body.className="idea-body";
        const t=document.createElement("div"); t.className="idea-text"; t.textContent=rec.content;
        const meta=document.createElement("div"); meta.className="idea-meta";
        let mt = "记录 "+formatDateTime(rec.createdAt);
        if (rec.archivedAt) mt += " · 整理 "+formatDateTime(rec.archivedAt);
        meta.textContent = mt;
        body.append(t,meta);
        const del=document.createElement("button"); del.className="idea-delete"; del.setAttribute("aria-label","删除");
        del.innerHTML='<svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>';
        del.addEventListener("click",()=>deleteRecord(rec.id));
        card.append(ab,body,del); return card;
      }

      function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll(".bottom-nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
        document.querySelector("#captureTab").classList.toggle("active",tab==="capture");
        document.querySelector("#taskTab").classList.toggle("active",tab==="task");
        document.querySelector("#ideaTab").classList.toggle("active",tab==="idea");
        render();
      }

      function updateInputState() {
        saveBtn.disabled = input.value.trim().length === 0;
      }

      function showToast(msg) {
        clearTimeout(toastTimer);
        const t=document.querySelector("#toast"); t.textContent=msg; t.classList.add("show");
        toastTimer=setTimeout(()=>t.classList.remove("show"),1600);
      }

      function render() { renderCapture(); renderTasks(); renderIdeas(); }

      // 类型切换
      typeTaskBtn.addEventListener("click",()=>{
        captureType="task";
        typeTaskBtn.className="type-btn active-task";
        typeIdeaBtn.className="type-btn";
      });
      typeIdeaBtn.addEventListener("click",()=>{
        captureType="idea";
        typeIdeaBtn.className="type-btn active-idea";
        typeTaskBtn.className="type-btn";
      });

      document.querySelectorAll(".bottom-nav button").forEach(b=>b.addEventListener("click",()=>switchTab(b.dataset.tab)));

      viewAllActiveBtn.addEventListener("click",()=>{
        taskFilter="active";
        document.querySelectorAll("#taskTab .filter-btn").forEach(i=>i.classList.toggle("active",i.dataset.filter==="active"));
        switchTab("task");
      });

      // 任务筛选
      document.querySelectorAll("#taskTab .filter-btn").forEach(b=>{
        b.addEventListener("click",()=>{
          document.querySelectorAll("#taskTab .filter-btn").forEach(i=>i.classList.remove("active"));
          b.classList.add("active");
          taskFilter=b.dataset.filter;
          renderTasks();
        });
      });

      // 灵感筛选
      document.querySelectorAll("#ideaTab .filter-btn").forEach(b=>{
        b.addEventListener("click",()=>{
          document.querySelectorAll("#ideaTab .filter-btn").forEach(i=>i.classList.remove("active"));
          b.classList.add("active");
          ideaFilter=b.dataset.filter;
          renderIdeas();
        });
      });

      input.addEventListener("input",updateInputState);
      taskSearch.addEventListener("input",renderTasks);
      ideaSearch.addEventListener("input",renderIdeas);
      input.addEventListener("keydown",e=>{ if((e.ctrlKey||e.metaKey)&&e.key==="Enter") addRecord(); });
      saveBtn.addEventListener("click",addRecord);

      render();
      input.focus();
    </script>
  </body>
</html>
